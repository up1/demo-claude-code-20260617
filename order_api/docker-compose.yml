services:
  api:
    build: .
    ports:
      - "8080:8080"
    env_file: .env
    depends_on:
      mongodb:
        condition: service_healthy

  mongodb:
    image: mongo:8
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mongo_data:
